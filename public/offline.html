<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#006834" />
    <title>Offline · Beisser LiveEdge</title>
    <link rel="icon" href="/icons/icon-192.png" type="image/png" />
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: #040f07;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      main {
        max-width: 28rem;
        text-align: center;
      }
      h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 0.75rem; }
      p { margin: 0 0 0.75rem; font-size: 0.9rem; color: rgba(255,255,255,0.7); line-height: 1.5; }
      p.small { font-size: 0.8rem; color: rgba(255,255,255,0.5); }
      button {
        margin-top: 1rem;
        background: #006834;
        color: #fff;
        border: 0;
        padding: 0.6rem 1.25rem;
        border-radius: 0.375rem;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover { background: #00532a; }
    </style>
  </head>
  <body>
    <main>
      <h1>You&rsquo;re offline</h1>
      <p>
        LiveEdge needs a network connection to load live ERP, dispatch, and sales data.
        Reconnect to pick up where you left off.
      </p>
      <p class="small">This page is served from your device &mdash; no sign-in required to view it.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
